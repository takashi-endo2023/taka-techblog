name: Zenn publish due

# 公開予定日が到来した Zenn 記事を自動公開する。
# 仕組み: scripts/zenn-publish-due.js が scripts/zenn-schedule.json（hash → 公開予定日）を読み、
#         予定日が来た記事を published:false → true に反転して push → Zenn が公開する。
# 在庫は published:false（下書き・published_at は書かない）で寝かせる。
# ⚠️ 旧方式（published:true + 未来の published_at で寝かせる）は使わない。Zenn はデプロイ毎に
#    未作成の published:true 記事を"全部"作りにいくため、在庫が増えると投稿レート制限
#    （24時間に5本）を毎回超過し、その日公開すべき記事まで巻き添えでブロックされる
#    （2026-07 に12日間ゼロ本の実害）。
# 安全設計: published_at を書かないので「published:false + published_at」の禁止コンボを作れない。
#          1回の実行で反転するのは2本まで（レート制限の安全弁）。
# ⚠️ コミットメッセージに [skip ci] を付けてはいけない。Zenn も skip マーカーを尊重して
#    デプロイをスキップするため、公開 push が Zenn に届かない（2026-07 に実害:
#    6/30・7/2 公開分が未反映になった）。ブログCIの抑止は deploy.yml 側の
#    paths-ignore: articles/** で行う。

on:
  schedule:
    # 記事の published_at は 09:00(JST) を基準にしているため、その直後に走らせる。
    # 発火漏れ対策で1日2回（処理は冪等なので二重実行でも安全）。
    - cron: '10 0 * * *' # 09:10 JST
    - cron: '0 6 * * *' # 15:00 JST
  workflow_dispatch: {} # 手動実行も可能（公開漏れの即時リカバリ用）

permissions:
  contents: write # 記事を書き換えて push するため

# 同時実行を防ぐ（二重 push 防止）
concurrency:
  group: zenn-publish
  cancel-in-progress: false

jobs:
  publish-due:
    name: Publish due articles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 公開予定日が到来した記事を published:true に反転
        run: node scripts/zenn-publish-due.js

      - name: commit & push（変更があるときだけ）
        run: |
          if [ -n "$(git status --porcelain articles/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add articles/
            git commit -m "chore(zenn): 公開日到来の記事を自動公開"
            git push
          else
            echo "公開日到来の記事なし。何もしない。"
          fi
