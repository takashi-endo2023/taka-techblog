name: Deploy to AWS

on:
  push:
    branches: [main]
    # articles/（Zenn記事）だけの変更ではブログの再ビルドは不要。
    # zenn-publish Action の自動公開 push でここが走るのを防ぐ
    # （旧方式の [skip ci] は Zenn のデプロイまでスキップしてしまうため廃止）。
    paths-ignore:
      - 'articles/**'
  workflow_dispatch:
  schedule:
    # 毎日 00:00 UTC（09:00 JST）にビルド&デプロイ。
    # 未来日 pubDate の記事を「その日が来たら自動公開」するための定期ビルド。
    - cron: '0 0 * * *'

permissions:
  id-token: write   # OIDC 認証に必須
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── ビルド ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      # ── AWS 認証（OIDC）────────────────────────────────────
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      # ── S3 デプロイ（アセット別キャッシュ戦略）──────────────
      # 1. JS・CSS → 1年間 immutable キャッシュ
      - name: Deploy static assets
        run: |
          aws s3 sync dist/_astro "s3://${{ secrets.S3_BUCKET }}/_astro" \
            --cache-control "max-age=31536000,immutable" \
            --delete

      # 2. ロゴ・フォント → 1年キャッシュ（ファイル名固定・ほぼ不変）
      - name: Deploy logo and fonts
        run: |
          aws s3 cp dist/logo.png "s3://${{ secrets.S3_BUCKET }}/logo.png" \
            --cache-control "max-age=31536000,immutable"
          aws s3 cp dist/logo-small.png "s3://${{ secrets.S3_BUCKET }}/logo-small.png" \
            --cache-control "max-age=31536000,immutable"
          aws s3 cp dist/logo-small.webp "s3://${{ secrets.S3_BUCKET }}/logo-small.webp" \
            --cache-control "max-age=31536000,immutable"
          aws s3 sync dist/fonts "s3://${{ secrets.S3_BUCKET }}/fonts" \
            --cache-control "max-age=31536000,immutable"

      # 3. 画像・フォント等 → 1日キャッシュ
      - name: Deploy public assets
        run: |
          aws s3 sync dist/ "s3://${{ secrets.S3_BUCKET }}/" \
            --cache-control "max-age=86400" \
            --exclude "*.html" \
            --exclude "_astro/*" \
            --exclude "logo.png" \
            --exclude "logo-small.png" \
            --exclude "logo-small.webp" \
            --exclude "fonts/*" \
            --delete

      # 4. HTML → gzip 圧縮 + no-cache
      - name: Deploy HTML files
        run: |
          # 削除された記事を S3 から除去（uncompressed で sync → --delete を利用）
          aws s3 sync dist/ "s3://${{ secrets.S3_BUCKET }}/" \
            --cache-control "max-age=0,no-cache" \
            --exclude "*" \
            --include "*.html" \
            --delete
          # gzip 圧縮して上書きアップロード
          find dist -name "*.html" -print0 | while IFS= read -r -d '' f; do
            key="${f#dist/}"
            gzip -9 -c "$f" | aws s3 cp - "s3://${{ secrets.S3_BUCKET }}/$key" \
              --content-encoding "gzip" \
              --content-type "text/html; charset=utf-8" \
              --cache-control "max-age=0,no-cache"
          done

      # ── CloudFront キャッシュ無効化 ─────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
